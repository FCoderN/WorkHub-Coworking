<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkHub Coworking</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<h1 class="text-center mb-5">WorkHub Coworking</h1>

<!-- FORMULARIO -->

<h2 class="text-center mb-4">Reserva tu Espacio</h2>

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">

    <div class="card shadow">
      <div class="card-body">

        <form id="formulario">

          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" name="nombre" placeholder="Tu nombre" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" class="form-control" name="apellido" placeholder="Tu apellido" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" name="correo" placeholder="nombre@email.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Selecciona el espacio</label>
            <select class="form-control" name="sala" required>
              <option value="">-- Elige una opción --</option>
              <option value="escritorio">Escritorio Individual</option>
              <option value="reunion">Sala de Reuniones</option>
              <option value="oficina">Oficina Privada</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Día</label>
            <input type="date" class="form-control" name="fecha" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Hora</label>
            <input type="time" class="form-control" name="hora" min="08:00" max="18:00" required>
          </div>

          <p class="text-muted small">
            Horarios:<br>
            Lunes a Viernes: 08:00 - 18:00<br>
            Sábado: 08:00 - 14:00
          </p>

          <button type="submit" class="btn btn-primary w-100">Reservar</button>

        </form>

      </div>
    </div>

  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
